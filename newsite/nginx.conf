# NGINX configuration for Django LLM project
# Place this file at: /etc/nginx/sites-available/django_llm
# Then enable it with: sudo ln -s /etc/nginx/sites-available/django_llm /etc/nginx/sites-enabled/
# Test config with: sudo nginx -t
# Reload with: sudo systemctl reload nginx

upstream django_gunicorn {
    # Gunicorn running on localhost port 8000
    server 127.0.0.1:8000 fail_timeout=0;
}

upstream ollama_server {
    # Ollama running on localhost port 11434
    server 127.0.0.1:11434 fail_timeout=0;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name newsite.com www.newsite.com;

    # Allow Let's Encrypt certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name newsite.com www.newsite.com;

    # -------------------------
    # SSL Configuration
    # -------------------------
    # Replace with your actual certificate paths from Let's Encrypt or your CA
    ssl_certificate /etc/letsencrypt/live/newsite.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/newsite.com/privkey.pem;

    # Strong SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (tell browsers to always use HTTPS)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # -------------------------
    # Security Headers
    # -------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # -------------------------
    # Logging
    # -------------------------
    access_log /var/log/nginx/django_llm_access.log;
    error_log /var/log/nginx/django_llm_error.log warn;

    # -------------------------
    # File Upload Limits
    # -------------------------
    client_max_body_size 10M;

    # -------------------------
    # Static Files
    # Served directly by NGINX, bypassing Gunicorn
    # Run: python manage.py collectstatic first
    # -------------------------
    location /static/ {
        alias /workspaces/Django_code/newDjango/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # -------------------------
    # Media Files
    # User uploaded files
    # -------------------------
    location /media/ {
        alias /workspaces/Django_code/newDjango/media/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # -------------------------
    # Favicon
    # -------------------------
    location = /favicon.ico {
        alias /workspaces/Django_code/newDjango/staticfiles/favicon.ico;
        access_log off;
        log_not_found off;
    }

    # -------------------------
    # Robots.txt
    # -------------------------
    location = /robots.txt {
        alias /workspaces/Django_code/newDjango/staticfiles/robots.txt;
        access_log off;
        log_not_found off;
    }

    # -------------------------
    # Ollama API Proxy
    # Only accessible internally - not exposed publicly
    # Remove this block if you don't need external Ollama access
    # -------------------------
    location /ollama/ {
        # Restrict to internal use only
        allow 127.0.0.1;
        deny all;

        proxy_pass http://ollama_server/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Long timeout for LLM responses
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
    }

    # -------------------------
    # Django Application
    # Proxied to Gunicorn
    # -------------------------
    location / {
        proxy_pass http://django_gunicorn;

        # Pass headers to Django
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        # LLM calls can be slow so these are set generously
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;

        # Redirect errors to NGINX
        proxy_redirect off;
    }

    # -------------------------
    # Block common attack vectors
    # -------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(env|git|sql|bak|log)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
